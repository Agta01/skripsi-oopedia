name: CI/CD Pipeline Agta-Oopedia

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, redis # Tambahkan redis
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build

  deploy:
    name: Deploy to VPS
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Deploy via SSH (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-rlgoDzvc --delete'
          SOURCE: '/'
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: '/root/skripsi/agta/oopedia'
          # Pastikan .env dan storage tidak didelete/di-overwrite oleh rsync jika sudah ada di server
          EXCLUDE: '/node_modules/, /tests/, /storage/logs/, /.git/, /.github/, /storage/*.key, .env'

      - name: Post-deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/skripsi/agta/oopedia
            
            # Maintenance mode on
            php artisan down || true
            
            # Update Database & Cache
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Perbaiki Permission Folder
            chmod -R 775 storage bootstrap/cache
            chown -R root:www-data storage bootstrap/cache
            
            # Manage process with PM2 (Sesuaikan dengan nama oopedia-agta)
            pm2 describe oopedia-agta > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart oopedia-agta --update-env
            else
              # Gunakan artisan serve jika belum pakai Octane
              pm2 start "php artisan serve --port=8000" --name oopedia-agta
            fi
            
            pm2 save
            
            # Maintenance mode off
            php artisan up
