name: CI/CD Pipeline Agta-Oopedia

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, redis
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm ci

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate --force

      - name: Build Assets
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build

  deploy:
    name: Deploy to VPS
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Deploy via SSH (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-rlgoDzvc --delete'
          SOURCE: '/'
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: '/root/skripsi/agta/oopedia'

          #JANGAN HAPUS STORAGE
          EXCLUDE: '/node_modules/, /tests/, /.git/, /.github/, .env, /storage/'

      - name: Post-deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/skripsi/agta/oopedia

            echo "🚧 Maintenance Mode ON"
            php artisan down || true

            echo "🔓 Fix akses root"
            chmod 755 /root
            chmod 755 /root/skripsi
            chmod 755 /root/skripsi/agta
            chmod 755 /root/skripsi/agta/oopedia

            echo "📁 Fix Laravel Storage"
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/framework/cache

            echo "🔐 Set Permission"
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            echo "⚙️ Laravel Optimization"
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🗄️ Run Migration"
            php artisan migrate --force

            echo "🔗 Storage Link"
            php artisan storage:link || true

            echo "🚀 Restart App (PM2)"
            pm2 describe oopedia-agta > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart oopedia-agta --update-env
            else
              pm2 start "php artisan serve --host=0.0.0.0 --port=8000" --name oopedia-agta
            fi

            pm2 save

            echo "✅ Maintenance Mode OFF"
            php artisan up
